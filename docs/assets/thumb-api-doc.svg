<svg xmlns="http://www.w3.org/2000/svg" width="320" height="140" viewBox="0 0 320 140" role="img" aria-labelledby="title desc">
  <title id="title">API documentation thumbnail</title>
  <desc id="desc">An authenticated device telemetry request connected to a JSON response.</desc>
  <rect width="320" height="140" rx="6" fill="#f5f4ed"/>
  <text x="14" y="23" fill="#1b365d" font-family="Georgia, serif" font-size="12" font-weight="600">API integration</text>
  <rect x="14" y="36" width="134" height="80" rx="5" fill="#e8e6dc" stroke="#1b365d"/>
  <g fill="#1b365d" font-family="Consolas, monospace">
    <text x="24" y="55" font-size="8" font-weight="600">GET telemetry</text>
    <text x="24" y="72" font-size="7">/v1/devices/{id}</text>
    <text x="24" y="89" font-size="7">Authorization: Bearer</text>
    <text x="24" y="106" font-size="7">limit=10</text>
  </g>
  <path d="M148 76 H174" stroke="#b38a58" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="178" y="36" width="128" height="80" rx="5" fill="#fffdf7" stroke="#c8bfad"/>
  <g fill="#34312c" font-family="Consolas, monospace" font-size="7.5">
    <text x="190" y="53">200 OK</text>
    <text x="190" y="70">{ "device_id": "XYZ",</text>
    <text x="190" y="87">  "light": 450,</text>
    <text x="190" y="104">  "battery": 85 }</text>
  </g>
  <text x="14" y="132" fill="#6f6b63" font-family="Consolas, monospace" font-size="7">auth · request · response · errors</text>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#b38a58"/>
    </marker>
  </defs>
</svg>
