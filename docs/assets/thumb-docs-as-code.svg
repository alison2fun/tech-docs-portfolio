  </g>
  <g stroke="#1b365d" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <path d="M68 50 H84"/>
    <path d="M126 50 H142"/>
    <path d="M196 50 C226 50 246 54 274 58"/>
    <path d="M258 80 C267 80 269 70 278 68"/>
