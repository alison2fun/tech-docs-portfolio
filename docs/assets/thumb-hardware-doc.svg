<svg xmlns="http://www.w3.org/2000/svg" width="320" height="140" viewBox="0 0 320 140" role="img" aria-labelledby="title desc">
  <title id="title">Hardware datasheet thumbnail</title>
  <desc id="desc">A register map and SPI timing diagram arranged side by side.</desc>
  <rect width="320" height="140" rx="6" fill="#f5f4ed"/>
  <text x="14" y="23" fill="#1b365d" font-family="Georgia, serif" font-size="12" font-weight="600">Register map</text>
  <g stroke="#1b365d" stroke-width="1">
    <rect x="14" y="35" width="190" height="84" fill="#fffdf7"/>
    <path d="M14 56 H204 M14 77 H204 M14 98 H204 M62 35 V119 M112 35 V119 M158 35 V119"/>
  </g>
  <g fill="#34312c" font-family="Consolas, monospace" font-size="8">
    <text x="21" y="50">Reg</text><text x="69" y="50">Addr</text><text x="119" y="50">Bit</text><text x="165" y="50">Access</text>
    <text x="21" y="71">CTRL1</text><text x="69" y="71">0x20</text><text x="119" y="71">ODR</text><text x="165" y="71">RW</text>
    <text x="21" y="92">STATUS</text><text x="69" y="92">0x27</text><text x="119" y="92">DRDY</text><text x="165" y="92">R</text>
    <text x="21" y="113">DATA</text><text x="69" y="113">0x30</text><text x="119" y="113">OUT</text><text x="165" y="113">R</text>
  </g>
  <text x="220" y="45" fill="#1b365d" font-family="Georgia, serif" font-size="11" font-weight="600">SPI timing</text>
  <g stroke="#b38a58" stroke-width="2" fill="none">
    <path d="M220 79 H236 V60 H252 V79 H268 V60 H284 V79 H300"/>
    <path d="M220 104 H240 L248 94 H272 L280 104 H300"/>
  </g>
  <g fill="#6f6b63" font-family="Consolas, monospace" font-size="7">
    <text x="220" y="57">SCLK</text>
    <text x="220" y="96">DATA</text>
    <text x="220" y="124">mode · fields · init</text>
  </g>
</svg>
