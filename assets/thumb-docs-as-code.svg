  </g>
  <g stroke="#1b365d" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <path d="M66 64 H82"/>
    <path d="M118 64 H134"/>
    <path d="M155 76 C150 92 142 100 131 100"/>
    <path d="M94 112 H110"/>
