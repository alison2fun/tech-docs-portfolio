site_name: 我的自动化文档作品集
theme:
  name: material
  language: zh  # 设置为中文
  features:
    - navigation.tabs # 顶部导航栏
    - search.highlight # 搜索高亮

# 告诉 MkDocs 要用 Mermaid 画图
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 简历 / Home: index.md
  - 项目案例:
    - 01 自动化流水线: 01-automation.md
    - 02 芯片数据手册重构: 02-hardware.md
    - 03 IoT 接口文档: 03-api.md
    - 04 OpenClaw 快速入门: 04-openclaw-quickstart.md
    - 05 任务拆解小程序:
        - 用户手册: 05-task-decomposer/index.md
        - API 参考文档: 05-task-decomposer/api-reference.md

  - 写作规范: style-guide.md
  - 快速开始: install.md
