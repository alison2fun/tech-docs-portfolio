site_name: 我的自动化文档作品集

# 1. 优化主题色与导航体验
theme:
  name: material
  # Kami 风格使用暖白底和墨蓝强调；底层 palette 也避免回退到 Material 绿色主题
  palette:
    primary: white
    accent: indigo
  features:
    - navigation.tabs          # 【核心】开启顶部导航 Tab，让侧边栏变清爽
    - navigation.tabs.sticky   # 顶部导航在向下滚动时吸顶
    # - navigation.sections      # 侧边栏主分类加粗，层级更分明
    - navigation.top           # 右下角增加“回到顶部”按钮
    - search.suggest           # 搜索输入提示
    - search.highlight         # 搜索结果高亮
    - content.code.copy        # 【核心】为代码块添加“一键复制”按钮

# 2. 引入自定义 CSS（带版本号文件名，避免 GitHub Pages/CDN 缓存旧样式）
extra_css:
  - styles/kami-portfolio-20260619.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-init.js

# 3. 开启必要的 Markdown 扩展（为了支持截图控制和更好的排版）
markdown_extensions:
  - attr_list                # 【核心】允许在 Markdown 中为图片添加 class 类名
  - md_in_html               # 允许在 HTML 标签内写 Markdown
  - tables                   # 确保表格正常渲染
  - admonition               # 支持 Note/Warning 等提示块
  - pymdownx.highlight       # 代码高亮基础支持
  - pymdownx.superfences:    # 支持更复杂的代码块嵌套，并把 Mermaid 代码块渲染为图表容器
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Start Here: index.md

  - 文档作品:
      - 文档质量自动化流水线:
          - 项目概览: 01-automation.md
          - 快速开始: install.md
          - 写作风格指南: style-guide.md
          - GitHub Actions 工作流: github-actions-workflow.md
          - 故障排查: troubleshooting.md
          - 更新记录: changelog.md
      - 硬件数据手册重构: 02-hardware.md
      - IoT 接口文档: 03-api.md
      - OpenClaw 快速入门: 04-openclaw-quickstart.md
      - 小程序产品文档集:
        - 总览: mini-programs.md
        - 微步 ACTION：AI 任务拆解:

          - 用户文档: 05-miniprogram-task-decomposer/index.md
          - API 参考: 05-miniprogram-task-decomposer/api-reference.md
          - PRD 产品需求: 05-miniprogram-task-decomposer/prd.md
          - 版本日志: 05-miniprogram-task-decomposer/release-notes.md
        - PopDots：波点拼贴图片生成器: dot-collage.md
        - 照片换底色小程序: photo-background.md

  - 案例复盘:
      - 作品集改版复盘: case-studies/portfolio-redesign.md

  - 写作样稿:
